<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Atomic Design">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#1e293b" stroke-width="1"/>

  <!-- Orbit 1 — horizontal -->
  <ellipse cx="60" cy="60" rx="44" ry="14"
    fill="none" stroke="#38bdf8" stroke-width="1.8"
    opacity="0.9" filter="url(#glow)"/>

  <!-- Orbit 2 — 60° -->
  <ellipse cx="60" cy="60" rx="44" ry="14"
    fill="none" stroke="#38bdf8" stroke-width="1.8"
    opacity="0.75" filter="url(#glow)"
    transform="rotate(60 60 60)"/>

  <!-- Orbit 3 — 120° -->
  <ellipse cx="60" cy="60" rx="44" ry="14"
    fill="none" stroke="#38bdf8" stroke-width="1.8"
    opacity="0.6" filter="url(#glow)"
    transform="rotate(120 60 60)"/>

  <!-- Electrons -->
  <circle cx="104" cy="60" r="4" fill="#7dd3fc" filter="url(#glow)"/>
  <circle cx="38" cy="36" r="3.2" fill="#38bdf8" filter="url(#glow)" opacity="0.9"/>
  <circle cx="38" cy="84" r="2.6" fill="#7dd3fc" filter="url(#glow)" opacity="0.8"/>

  <!-- Nucleus -->
  <circle cx="60" cy="60" r="9" fill="url(#nucleus)" filter="url(#glow-strong)"/>
  <circle cx="57" cy="57" r="3.5" fill="#fed7aa" opacity="0.4"/>
</svg>

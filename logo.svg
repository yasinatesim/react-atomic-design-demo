<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80" role="img" aria-label="React Atomic Design Demo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow-b">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-o">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="80" rx="14" fill="#0f172a"/>

  <!-- Subtle left accent bar -->
  <rect x="0" y="0" width="4" height="80" rx="2" fill="#3b82f6" opacity="0.7"/>

  <!-- ATOM MARK — centered vertically in 80px, left zone 0–80 -->
  <!-- Orbit 1 — flat ellipse -->
  <ellipse cx="44" cy="40" rx="28" ry="9"
    fill="none" stroke="#38bdf8" stroke-width="1.2"
    opacity="0.85" filter="url(#glow-b)"/>

  <!-- Orbit 2 — rotated 60° -->
  <ellipse cx="44" cy="40" rx="28" ry="9"
    fill="none" stroke="#7dd3fc" stroke-width="1"
    opacity="0.7" filter="url(#glow-b)"
    transform="rotate(60 44 40)"/>

  <!-- Orbit 3 — rotated 120° -->
  <ellipse cx="44" cy="40" rx="28" ry="9"
    fill="none" stroke="#38bdf8" stroke-width="1"
    opacity="0.6" filter="url(#glow-b)"
    transform="rotate(120 44 40)"/>

  <!-- Electrons -->
  <circle cx="72" cy="40" r="2.8" fill="#38bdf8" filter="url(#glow-b)"/>
  <circle cx="30" cy="25.5" r="2.2" fill="#7dd3fc" filter="url(#glow-b)" opacity="0.9"/>
  <circle cx="30" cy="54.5" r="1.8" fill="#38bdf8" filter="url(#glow-b)" opacity="0.8"/>

  <!-- Nucleus -->
  <circle cx="44" cy="40" r="5.5" fill="url(#nucleus)" filter="url(#glow-o)"/>
  <circle cx="42.5" cy="38.5" r="2" fill="#fed7aa" opacity="0.5"/>

  <!-- Divider -->
  <line x1="90" y1="16" x2="90" y2="64" stroke="#1e293b" stroke-width="1.5"/>

  <!-- WORDMARK -->
  <!-- "atomic" — large, bold, monospace -->
  <text x="106" y="36"
    font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-size="20" font-weight="700"
    letter-spacing="2"
    fill="#f1f5f9">atomic</text>

  <!-- "design" — smaller, spaced, accent color -->
  <text x="108" y="56"
    font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-size="12" font-weight="400"
    letter-spacing="6"
    fill="#38bdf8" opacity="0.9">design</text>

  <!-- Orange dot accent between lines -->
  <circle cx="99" cy="46" r="2" fill="#fb923c" opacity="0.9"/>

  <!-- Tech tag — far right -->
  <text x="282" y="34"
    font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-size="8" letter-spacing="1.5"
    fill="#334155">REACT</text>
  <text x="277" y="47"
    font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-size="8" letter-spacing="1.5"
    fill="#334155">VITE · SB</text>
</svg>

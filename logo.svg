<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" role="img" aria-label="React Atomic Design Demo logo">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <radialGradient id="nucleus-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="60%" stop-color="#e8621a"/>
      <stop offset="100%" stop-color="#c44a00"/>
    </radialGradient>
    <linearGradient id="orbit1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="orbit2-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#7dd3fc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="orbit3-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <!-- Background subtle glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip path for atom icon area -->
    <clipPath id="icon-clip">
      <rect x="0" y="0" width="100" height="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" fill="#0f172a" rx="12"/>

  <!-- Subtle background glow around atom -->
  <ellipse cx="50" cy="50" rx="45" ry="45" fill="url(#bg-glow)"/>

  <!-- ═══════════════════════════════════ -->
  <!-- ATOM ICON (left, 100×100 zone)     -->
  <!-- ═══════════════════════════════════ -->

  <!-- Orbit 1 — horizontal ellipse -->
  <ellipse cx="50" cy="50" rx="38" ry="13"
    fill="none"
    stroke="url(#orbit1-grad)"
    stroke-width="1.2"
    filter="url(#glow-blue)"
    opacity="0.9"/>

  <!-- Orbit 2 — rotated 60° -->
  <ellipse cx="50" cy="50" rx="38" ry="13"
    fill="none"
    stroke="url(#orbit2-grad)"
    stroke-width="1.2"
    transform="rotate(60 50 50)"
    filter="url(#glow-blue)"
    opacity="0.85"/>

  <!-- Orbit 3 — rotated 120° -->
  <ellipse cx="50" cy="50" rx="38" ry="13"
    fill="none"
    stroke="url(#orbit3-grad)"
    stroke-width="1.2"
    transform="rotate(120 50 50)"
    filter="url(#glow-blue)"
    opacity="0.8"/>

  <!-- Electron 1 — on horizontal orbit, right -->
  <circle cx="88" cy="50" r="3.2"
    fill="#38bdf8"
    filter="url(#glow-blue)"/>

  <!-- Electron 2 — on 60° orbit, top-left -->
  <circle cx="31" cy="23.6" r="2.6"
    fill="#7dd3fc"
    filter="url(#glow-blue)"
    opacity="0.9"/>

  <!-- Electron 3 — on 120° orbit, bottom-left -->
  <circle cx="31" cy="76.4" r="2.2"
    fill="#38bdf8"
    filter="url(#glow-blue)"
    opacity="0.8"/>

  <!-- Nucleus core -->
  <circle cx="50" cy="50" r="6.5"
    fill="url(#nucleus-grad)"
    filter="url(#glow-orange)"/>

  <!-- Nucleus inner highlight -->
  <circle cx="48" cy="47.5" r="2.2"
    fill="#ffb347"
    opacity="0.6"/>

  <!-- ═══════════════════════════════════ -->
  <!-- TYPOGRAPHY                          -->
  <!-- ═══════════════════════════════════ -->

  <!-- Main wordmark: "atomic" -->
  <text
    x="108"
    y="44"
    font-family="'Courier New', 'Courier', monospace"
    font-size="22"
    font-weight="700"
    letter-spacing="3"
    fill="url(#text-grad)"
    filter="url(#glow-soft)"
  >atomic</text>

  <!-- Accent dot between words -->
  <circle cx="108" cy="58" r="2"
    fill="#ff8c42"
    filter="url(#glow-orange)"
    opacity="0.9"/>

  <!-- Sub wordmark: "design" -->
  <text
    x="116"
    y="68"
    font-family="'Courier New', 'Courier', monospace"
    font-size="14"
    font-weight="400"
    letter-spacing="5"
    fill="#38bdf8"
    opacity="0.85"
  >design</text>

  <!-- Thin separator line -->
  <line x1="108" y1="75" x2="300" y2="75"
    stroke="#1e293b"
    stroke-width="0.8"
    opacity="0.8"/>

  <!-- Bottom tech label -->
  <text
    x="116"
    y="87"
    font-family="'Courier New', 'Courier', monospace"
    font-size="8"
    font-weight="400"
    letter-spacing="3"
    fill="#475569"
  >react · storybook · vite</text>

  <!-- Version badge -->
  <rect x="270" y="80" width="36" height="13" rx="3"
    fill="#1e293b"
    stroke="#334155"
    stroke-width="0.6"/>
  <text
    x="288"
    y="89.5"
    font-family="'Courier New', 'Courier', monospace"
    font-size="7"
    font-weight="600"
    letter-spacing="1"
    fill="#64748b"
    text-anchor="middle"
  >v1.0</text>
</svg>
